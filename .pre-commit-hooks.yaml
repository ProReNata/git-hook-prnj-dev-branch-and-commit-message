- id: ticket-dev-check-branch
  name: Verify that the branch contains a ticket ID and DEV-n
  description: Checks for a ticket ID (e.g. PRNJ-n, FLOW-n) and DEV-n in the branch name
  entry: prnj-dev-branch-and-commit-message check-branch
  language: python
  always_run: true
  stages: [prepare-commit-msg]
- id: ticket-dev-commit-msg
  name: Verify that the commit message contains a ticket ID and DEV-n, and optionally adds them if missing
  description: Verifies that a ticket ID and DEV-n are part of the commit message
  entry: prnj-dev-branch-and-commit-message check-message
  language: python
  always_run: true
  stages: [commit-msg]
